<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Barcode scanner">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#10303a"/><stop offset="1" stop-color="#14181f"/></linearGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.45" r="0.55"><stop offset="0" stop-color="#33e0ff" stop-opacity="0.24"/><stop offset="1" stop-color="#33e0ff" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg2)"/>
  <ellipse cx="300" cy="200" rx="230" ry="160" fill="url(#glow2)"/>
  <!-- barcode card -->
  <rect x="180" y="120" width="240" height="160" rx="16" fill="#f4f6fa"/>
  <g fill="#14181f">
