    <rect x="218" y="150" width="3" height="100"/>
    <rect x="227" y="150" width="9" height="100"/>
    <rect x="242" y="150" width="4" height="100"/>
    <rect x="252" y="150" width="7" height="100"/>
    <rect x="266" y="150" width="3" height="100"/>
    <rect x="275" y="150" width="10" height="100"/>
    <rect x="291" y="150" width="4" height="100"/>
    <rect x="301" y="150" width="6" height="100"/>
    <rect x="314" y="150" width="9" height="100"/>
    <rect x="329" y="150" width="3" height="100"/>
    <rect x="338" y="150" width="7" height="100"/>
    <rect x="352" y="150" width="5" height="100"/>
    <rect x="363" y="150" width="9" height="100"/>
    <rect x="379" y="150" width="4" height="100"/>
  </g>
  <!-- scan beam -->
  <rect x="170" y="196" width="260" height="4" rx="2" fill="#ff5a5a"/>
  <rect x="170" y="196" width="260" height="4" rx="2" fill="#ff5a5a" opacity="0.5" filter="blur(6px)"/>
</svg>
