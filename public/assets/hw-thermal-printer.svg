<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thermal receipt printer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1b2740"/><stop offset="1" stop-color="#14181f"/></linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3a3f4c"/><stop offset="1" stop-color="#23262f"/></linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55"><stop offset="0" stop-color="#569dff" stop-opacity="0.28"/><stop offset="1" stop-color="#569dff" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="200" rx="230" ry="160" fill="url(#glow)"/>
  <!-- receipt -->
  <g>
    <rect x="232" y="70" width="136" height="150" rx="6" fill="#f4f1ea"/>
    <g stroke="#c9c3b4" stroke-width="3" stroke-linecap="round">
      <line x1="250" y1="96" x2="350" y2="96"/>
      <line x1="250" y1="116" x2="330" y2="116"/>
      <line x1="250" y1="136" x2="350" y2="136"/>
      <line x1="250" y1="156" x2="312" y2="156"/>
    </g>
    <rect x="250" y="182" width="100" height="14" rx="3" fill="#569dff"/>
  </g>
  <!-- printer body -->
  <rect x="206" y="210" width="188" height="120" rx="18" fill="url(#body)" stroke="#454a57" stroke-width="2"/>
  <rect x="226" y="206" width="148" height="20" rx="6" fill="#15181f"/>
  <circle cx="356" cy="250" r="7" fill="#22c55e"/>
  <rect x="226" y="280" width="92" height="10" rx="5" fill="#15181f"/>
  <rect x="226" y="298" width="60" height="8" rx="4" fill="#2c2f39"/>
</svg>
