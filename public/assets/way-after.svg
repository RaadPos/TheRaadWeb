<svg width="600" height="440" viewBox="0 0 600 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The new way — Raad on a phone">
  <defs>
    <linearGradient id="newBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2740"/>
      <stop offset="1" stop-color="#14181f"/>
    </linearGradient>
    <linearGradient id="sales2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#569dff"/>
      <stop offset="1" stop-color="#2f5fa0"/>
    </linearGradient>
    <radialGradient id="halo2" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#569dff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#569dff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="440" fill="url(#newBg)"/>
  <ellipse cx="300" cy="210" rx="240" ry="180" fill="url(#halo2)"/>
  <!-- phone -->
  <g transform="rotate(-5 300 220)">
    <rect x="222" y="70" width="156" height="320" rx="30" fill="#23262f" stroke="#3a3e49" stroke-width="2"/>
    <rect x="234" y="82" width="132" height="296" rx="22" fill="#16181f"/>
    <rect x="278" y="92" width="44" height="7" rx="3.5" fill="#3a3e49"/>
    <!-- sales card -->
    <rect x="248" y="112" width="104" height="64" rx="12" fill="url(#sales2)"/>
    <rect x="258" y="126" width="40" height="6" rx="3" fill="#ffffff" opacity="0.7"/>
    <rect x="258" y="142" width="64" height="14" rx="4" fill="#ffffff"/>
    <!-- chart -->
    <g fill="#569dff">
      <rect x="252" y="250" width="14" height="40" rx="3"/>
      <rect x="274" y="232" width="14" height="58" rx="3"/>
      <rect x="296" y="244" width="14" height="46" rx="3"/>
      <rect x="318" y="214" width="14" height="76" rx="3"/>
      <rect x="340" y="236" width="12" height="54" rx="3"/>
    </g>
    <!-- list rows -->
    <g fill="#2b2e3a">
      <rect x="252" y="306" width="100" height="20" rx="6"/>
      <rect x="252" y="332" width="100" height="20" rx="6"/>
    </g>
  </g>
</svg>
